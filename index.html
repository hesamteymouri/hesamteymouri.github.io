<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Hesam Teymouri Athar</title>

<style>
*{
    box-sizing:border-box;
}

body{
    font-family: Arial, sans-serif;
    margin:0;
    background:#eef2f7;
    color:#1f2d3d;
    line-height:1.6;
}

header{
    background:linear-gradient(135deg, #1C0770, #0055a5);
    color:white;
    padding:60px 20px 40px;
    text-align:center;
}

header h1{
    margin:0;
    font-size:42px;
    font-weight:700;
}

header p{
    margin-top:12px;
    font-size:18px;
    max-width:700px;
    margin-left:auto;
    margin-right:auto;
}

nav{
    background:white;
    padding:14px 10px;
    text-align:center;
    box-shadow:0 2px 8px rgba(0,0,0,0.08);
    position:sticky;
    top:0;
    z-index:1000;
}

nav button{
    background:none;
    border:none;
    color:#1C0770;
    font-size:16px;
    font-weight:600;
    margin:0 12px;
    cursor:pointer;
    padding:10px 14px;
    border-radius:6px;
    transition:all 0.2s ease;
}

nav button:hover{
    background:#e6eef8;
}

nav button.active{
    background:#e6eef8;
    color:#1C0770;
    border-radius:6px;
}

.content{
    padding:40px 20px;
    max-width:1100px;
    margin:40px auto;
}

.tab{
    display:none;
}

.tab.active{
    display:block;
}

.section-box{
    background:white;
    border-radius:16px;
    padding:35px;
    box-shadow:0 8px 24px rgba(0,0,0,0.08);
}

h2{
    color:#1C0770;
    margin-top:0;
    margin-bottom:20px;
    font-size:30px;
}

h3{
    color:#004b8d;
    margin-bottom:8px;
}

.hero-section{
    width:100%;
    padding:130px 40px 120px;
    background:white;
}

.hero-inner{
    max-width:1700px;
    margin:auto;
}

.hero{
    display:flex;
    align-items:center;
    justify-content:space-between;
    gap:70px;
    flex-wrap:wrap;
}

.hero-text{
    flex:1.1;
    min-width:300px;
}

.hero-text h2{
    font-size:42px;
    margin-bottom:18px;
    color:#0a2e57;
}

.hero-text p{
    font-size:21px;
    line-height:1.75;
    margin-bottom:20px;
    color:#24384d;
    max-width:650px;
}

.hero-image{
    flex:0.9;
    min-width:320px;
    text-align:center;
}

.hero-image img{
    width:100%;
    max-width:430px;
    height:auto;
    object-fit:cover;
    border-radius:24px;
    border:none;
    box-shadow:0 18px 45px rgba(0,0,0,0.12);
}

.button-group{
    margin-top:28px;
}

.button-group a{
    display:inline-block;
    background:#0055a5;
    color:white;
    text-decoration:none;
    padding:13px 22px;
    border-radius:10px;
    margin-right:12px;
    margin-bottom:12px;
    font-weight:600;
    transition:all 0.2s ease;
}

.button-group a:hover{
    background:#1C0770;
    transform:translateY(-1px);
}

.button-group{
    margin-top:25px;
}

.button-group a{
    display:inline-block;
    background:#0055a5;
    color:white;
    text-decoration:none;
    padding:11px 18px;
    border-radius:8px;
    margin-right:10px;
    margin-bottom:10px;
    font-weight:600;
    transition:background 0.2s ease;
}

.button-group a:hover{
    background:#1C0770;
}

.highlight-grid{
    display:grid;
    grid-template-columns:repeat(auto-fit, minmax(250px, 1fr));
    gap:20px;
    margin-top:30px;
}

.card{
    background:#f8fbff;
    border-left:5px solid #0055a5;
    border-radius:12px;
    padding:22px;
}

.card p{
    margin-bottom:0;
}

ul{
    padding-left:22px;
}

.contact-links a{
    color:#0055a5;
    text-decoration:none;
    font-weight:600;
}

.contact-links a:hover{
    text-decoration:underline;
}

footer{
    text-align:center;
    padding:30px 20px 40px;
    color:#5a6b7c;
    font-size:14px;
}

@media (max-width: 768px){
    header h1{
        font-size:32px;
    }

    header p{
        font-size:16px;
    }

    nav button{
        display:inline-block;
        margin:6px 6px;
    }

    .section-box{
        padding:25px;
    }

    .hero{
        flex-direction:column-reverse;
        text-align:center;
    }

    .hero-text{
        text-align:center;
    }

    .hero-image img{
        width:200px;
        height:200px;
    }
}

.course-grid{
display:grid;
grid-template-columns:1fr;
gap:16px;
margin-bottom:20px;
}

.course-card{
display:block;
background:#f8fbff;
border-left:5px solid #0055a5;
padding:18px;
border-radius:10px;
text-decoration:none;
color:#1C0770;
font-weight:600;
transition:all 0.2s ease;
}

.course-card:hover{
background:#eaf2fb;
transform:translateY(-2px);
}
</style>
</head>
